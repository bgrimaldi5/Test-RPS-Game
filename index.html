<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rock Paper Scissors</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #dbeeff;
      --card:   #bfdfff;
      --border: #60a5fa;
      --accent: #1d6fbf;
      --yellow: #ca8a04;
      --teal:   #0f8a5f;
      --red:    #dc2626;
      --text:   #0c2340;
      --muted:  #2e6fa3;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .game {
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    h1 {
      font-family: 'Boogaloo', cursive;
      font-size: clamp(2rem, 8vw, 3.5rem);
      line-height: 1;
      letter-spacing: 1px;
      color: var(--accent);
      text-shadow: 0 0 30px rgba(29,111,191,0.3);
      margin-bottom: 0.25rem;
    }

    .choices {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
      margin-bottom: 2rem;
    }

    .choice {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 0.75rem 1rem;
      width: 130px;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .choice:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(29,111,191,0.25);
    }

    .choice:active {
      transform: translateY(-2px) scale(0.96);
    }

    .choice-icon {
      font-size: 3rem;
      line-height: 1;
    }

    .choice-icon.dark {
      filter: brightness(0.18) saturate(0);
    }

    .choice-name {
      font-family: 'Boogaloo', cursive;
      font-size: 1.15rem;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .arena {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .arena.visible { display: flex; }

    .arena-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .arena-icon {
      font-size: 4rem;
      line-height: 1;
    }

    .arena-icon.dark {
      filter: brightness(0.18) saturate(0);
    }

    .arena-label {
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 800;
    }

    .arena-vs {
      font-family: 'Boogaloo', cursive;
      font-size: 1.8rem;
      color: var(--border);
    }

    .result-msg {
      font-family: 'Boogaloo', cursive;
      font-size: 2.2rem;
      letter-spacing: 2px;
      min-height: 2.5rem;
      margin-bottom: 1.75rem;
    }

    .result-msg.win  { color: var(--teal);   text-shadow: 0 0 14px rgba(15,138,95,0.4); }
    .result-msg.lose { color: var(--red);    text-shadow: 0 0 14px rgba(220,38,38,0.4); }
    .result-msg.tie  { color: var(--yellow); text-shadow: 0 0 14px rgba(202,138,4,0.4); }

    .scoreboard {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 0.9rem 2rem;
    }

    .score-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
    }

    .score-label {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 800;
    }

    .score-num {
      font-family: 'Boogaloo', cursive;
      font-size: 2.5rem;
      line-height: 1;
      color: var(--yellow);
    }

    .score-sep {
      font-family: 'Boogaloo', cursive;
      font-size: 1rem;
      color: var(--border);
    }

    /* ── Robot ── */
    .robot-wrap {
      position: fixed;
      right: 2rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      user-select: none;
    }

    .robot-bubble {
      background: white;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 0.4rem 0.75rem;
      font-family: 'Boogaloo', cursive;
      font-size: 0.95rem;
      color: var(--text);
      white-space: nowrap;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      position: relative;
    }

    .robot-bubble::after {
      content: '';
      position: absolute;
      bottom: -9px;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--border);
    }

    .robot-bubble::before {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: white;
      z-index: 1;
    }

    .robot-bubble.show {
      opacity: 1;
      transform: translateY(0);
    }

    .robot-svg {
      width: 90px;
      height: auto;
      filter: drop-shadow(0 4px 10px rgba(29,111,191,0.2));
    }

    .robot-svg.bounce {
      animation: robotBounce 0.6s ease;
    }

    @keyframes robotBounce {
      0%   { transform: translateY(0); }
      30%  { transform: translateY(-18px); }
      55%  { transform: translateY(-6px); }
      75%  { transform: translateY(-13px); }
      100% { transform: translateY(0); }
    }

    .robot-svg.droop {
      animation: robotDroop 0.5s ease forwards;
    }

    @keyframes robotDroop {
      0%   { transform: rotate(0deg); }
      40%  { transform: rotate(-8deg) translateY(4px); }
      100% { transform: rotate(-5deg) translateY(3px); }
    }

    @media (max-width: 400px) {
      .choice      { width: 100px; padding: 1rem 0.5rem 0.75rem; }
      .choice-icon { font-size: 2.5rem; }
      .choices     { gap: 0.6rem; }
    }

    @media (max-width: 780px) {
      .robot-wrap { display: none; }
    }
  </style>
</head>
<body>

  <div class="game">
    <h1>Rock Paper Scissors</h1>

    <div class="choices">
      <button class="choice" onclick="play('rock')">
        <span class="choice-icon dark">&#x1FAA8;</span>
        <span class="choice-name">Rock</span>
      </button>
      <button class="choice" onclick="play('paper')">
        <span class="choice-icon">&#x1F4C4;</span>
        <span class="choice-name">Paper</span>
      </button>
      <button class="choice" onclick="play('scissors')">
        <span class="choice-icon">&#x2702;&#xFE0F;</span>
        <span class="choice-name">Scissors</span>
      </button>
    </div>

    <div class="arena" id="arena">
      <div class="arena-side">
        <div class="arena-icon" id="player-icon"></div>
        <div class="arena-label">You</div>
      </div>
      <div class="arena-vs">VS</div>
      <div class="arena-side">
        <div class="arena-icon" id="cpu-icon"></div>
        <div class="arena-label">CPU</div>
      </div>
    </div>

    <div class="result-msg" id="result-msg"></div>

    <div class="scoreboard">
      <div class="score-col">
        <div class="score-label">You</div>
        <div class="score-num" id="score-you">0</div>
      </div>
      <div class="score-sep">&#8212;</div>
      <div class="score-col">
        <div class="score-label">Ties</div>
        <div class="score-num" id="score-tie">0</div>
      </div>
      <div class="score-sep">&#8212;</div>
      <div class="score-col">
        <div class="score-label">CPU</div>
        <div class="score-num" id="score-cpu">0</div>
      </div>
    </div>
  </div>

  <!-- Robot -->
  <div class="robot-wrap">
    <div class="robot-bubble" id="robot-bubble">I am ready!</div>
    <svg class="robot-svg" id="robot-svg" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
      <line x1="50" y1="12" x2="50" y2="22" stroke="#1d6fbf" stroke-width="3" stroke-linecap="round"/>
      <circle cx="50" cy="9" r="5" fill="#60a5fa" stroke="#1d6fbf" stroke-width="2"/>
      <rect x="20" y="22" width="60" height="44" rx="10" fill="#bfdfff" stroke="#1d6fbf" stroke-width="2.5"/>
      <rect x="29" y="32" width="16" height="14" rx="4" fill="#1d6fbf"/>
      <rect id="eye-l" x="33" y="36" width="8" height="6" rx="2" fill="#dbeeff"/>
      <rect x="55" y="32" width="16" height="14" rx="4" fill="#1d6fbf"/>
      <rect id="eye-r" x="59" y="36" width="8" height="6" rx="2" fill="#dbeeff"/>
      <path id="robot-mouth" d="M 34 58 Q 50 58 66 58" stroke="#1d6fbf" stroke-width="3" fill="none" stroke-linecap="round"/>
      <rect x="43" y="66" width="14" height="8" rx="3" fill="#93c5fd" stroke="#1d6fbf" stroke-width="2"/>
      <rect x="15" y="74" width="70" height="50" rx="12" fill="#bfdfff" stroke="#1d6fbf" stroke-width="2.5"/>
      <rect x="30" y="83" width="40" height="28" rx="6" fill="#93c5fd" stroke="#60a5fa" stroke-width="1.5"/>
      <circle cx="42" cy="97" r="5" fill="#1d6fbf"/>
      <circle cx="58" cy="97" r="5" fill="#60a5fa"/>
      <rect x="36" y="87" width="28" height="5" rx="2.5" fill="#dbeeff" opacity="0.7"/>
      <rect x="1" y="76" width="14" height="34" rx="7" fill="#bfdfff" stroke="#1d6fbf" stroke-width="2"/>
      <rect x="85" y="76" width="14" height="34" rx="7" fill="#bfdfff" stroke="#1d6fbf" stroke-width="2"/>
      <rect x="25" y="122" width="18" height="8" rx="4" fill="#93c5fd" stroke="#1d6fbf" stroke-width="2"/>
      <rect x="57" y="122" width="18" height="8" rx="4" fill="#93c5fd" stroke="#1d6fbf" stroke-width="2"/>
    </svg>
  </div>

  <script>
    var icons = {
      rock:     '&#x1FAA8;',
      paper:    '&#x1F4C4;',
      scissors: '&#x2702;&#xFE0F;'
    };
    var picks = ['rock', 'paper', 'scissors'];
    var wins = 0, ties = 0, losses = 0;
    var bubbleTimer = null;

    var phrases = {
      win:  ['I WIN! HA!', 'Too easy!', 'Calculated!', 'Beep BOOM!', 'CPU rules!'],
      lose: ['Nooo...', 'Does not compute', 'Need a reboot', 'Unfair!', '*sad beep*'],
      tie:  ['A tie? Hmm.', 'Interesting...', 'Processing...', 'We are equal!']
    };

    function play(player) {
      var cpu = picks[Math.floor(Math.random() * 3)];

      // Show arena
      document.getElementById('arena').classList.add('visible');
      document.getElementById('player-icon').innerHTML  = icons[player];
      document.getElementById('player-icon').className  = 'arena-icon' + (player === 'rock' ? ' dark' : '');
      document.getElementById('cpu-icon').innerHTML     = icons[cpu];
      document.getElementById('cpu-icon').className     = 'arena-icon' + (cpu === 'rock' ? ' dark' : '');

      // Determine outcome
      var msg, cls;
      if (player === cpu) {
        msg = "It's a tie!";
        cls = 'tie';
        ties++;
        document.getElementById('score-tie').textContent = ties;
      } else if (
        (player === 'rock'     && cpu === 'scissors') ||
        (player === 'paper'    && cpu === 'rock')     ||
        (player === 'scissors' && cpu === 'paper')
      ) {
        msg = 'You win!';
        cls = 'win';
        wins++;
        document.getElementById('score-you').textContent = wins;
      } else {
        msg = 'You lose!';
        cls = 'lose';
        losses++;
        document.getElementById('score-cpu').textContent = losses;
      }

      // Show result
      var el = document.getElementById('result-msg');
      el.textContent = msg;
      el.className   = 'result-msg ' + cls;

      // Animate robot
      reactRobot(cls);
    }

    function reactRobot(outcome) {
      var svg    = document.getElementById('robot-svg');
      var bubble = document.getElementById('robot-bubble');
      var mouth  = document.getElementById('robot-mouth');
      var eyeL   = document.getElementById('eye-l');
      var eyeR   = document.getElementById('eye-r');

      // Reset animation by removing classes and forcing reflow
      svg.classList.remove('bounce', 'droop');
      svg.getBoundingClientRect();

      // Pick random phrase
      var list = phrases[outcome];
      bubble.textContent = list[Math.floor(Math.random() * list.length)];

      if (outcome === 'win') {
        svg.classList.add('bounce');
        mouth.setAttribute('d', 'M 28 54 Q 50 68 72 54');
        eyeL.setAttribute('fill', '#60a5fa');
        eyeR.setAttribute('fill', '#60a5fa');
        eyeL.setAttribute('height', '8');
        eyeR.setAttribute('height', '8');
        bubble.style.background  = '#d1fae5';
        bubble.style.borderColor = '#0f8a5f';
        bubble.style.color       = '#064e3b';
      } else if (outcome === 'lose') {
        svg.classList.add('droop');
        mouth.setAttribute('d', 'M 32 62 Q 50 52 68 62');
        eyeL.setAttribute('fill', '#93c5fd');
        eyeR.setAttribute('fill', '#93c5fd');
        eyeL.setAttribute('height', '3');
        eyeR.setAttribute('height', '3');
        bubble.style.background  = '#fee2e2';
        bubble.style.borderColor = '#dc2626';
        bubble.style.color       = '#7f1d1d';
      } else {
        mouth.setAttribute('d', 'M 34 58 Q 50 58 66 58');
        eyeL.setAttribute('fill', '#dbeeff');
        eyeR.setAttribute('fill', '#dbeeff');
        eyeL.setAttribute('height', '6');
        eyeR.setAttribute('height', '6');
        bubble.style.background  = 'white';
        bubble.style.borderColor = '#60a5fa';
        bubble.style.color       = '#0c2340';
      }

      // Show bubble, then hide after 2.5s
      bubble.classList.remove('show');
      bubble.getBoundingClientRect();
      bubble.classList.add('show');
      clearTimeout(bubbleTimer);
      bubbleTimer = setTimeout(function() {
        bubble.classList.remove('show');
      }, 2500);
    }
  </script>

</body>
</html>
